<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Setup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: radial-gradient(circle at 12% 18%, rgba(192,57,43,0.16) 0, rgba(192,57,43,0) 32%), radial-gradient(circle at 88% 0%, rgba(231,76,60,0.12) 0, rgba(231,76,60,0) 28%), linear-gradient(135deg, #fff5f5 0%, #f6f9ff 58%, #eef4ff 100%) fixed; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .setup-card { width: 100%; max-width: 460px; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
        .brand { color: #c0392b; font-weight: 700; font-size: 1.3rem; }
        .btn-primary-red { background: #c0392b; border: none; color: #fff; }
        .btn-primary-red:hover { background: #a93226; color: #fff; }
        .blood-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .blood-option input { display: none; }
        .blood-option label {
            display: block; text-align: center; padding: 10px 4px;
            border: 1.5px solid #dee2e6; border-radius: 8px;
            cursor: pointer; font-weight: 500; font-size: 14px;
            transition: all 0.2s;
        }
        .blood-option input:checked + label {
            border-color: #c0392b; background: #fdf0ef; color: #c0392b;
        }
        .blood-option label:hover { border-color: #c0392b; }
    </style>
</head>
<body>
<div class="card setup-card p-4">
    <div class="text-center mb-4">
        <div class="brand">Smart Blood Bank</div>
        <h5 class="mt-2">Complete Donor Profile</h5>
        <p class="text-muted small">
            Your info helps us match you with patients in need
        </p>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/donor/setup}" method="post">
        <div class="mb-3">
            <label class="form-label">Your Blood Group</label>
            <div class="blood-grid">
                <div class="blood-option">
                    <input type="radio" name="bloodGroup" id="bg1" value="A_POS" required
                           th:checked="${donor != null && donor.bloodGroup.name() == 'A_POS'}">
                    <label for="bg1">A+</label>
                </div>
                <div class="blood-option">
                    <input type="radio" name="bloodGroup" id="bg2" value="A_NEG"
                           th:checked="${donor != null && donor.bloodGroup.name() == 'A_NEG'}">
                    <label for="bg2">A-</label>
                </div>
                <div class="blood-option">
                    <input type="radio" name="bloodGroup" id="bg3" value="B_POS"
                           th:checked="${donor != null && donor.bloodGroup.name() == 'B_POS'}">
                    <label for="bg3">B+</label>
                </div>
                <div class="blood-option">
                    <input type="radio" name="bloodGroup" id="bg4" value="B_NEG"
                           th:checked="${donor != null && donor.bloodGroup.name() == 'B_NEG'}">
                    <label for="bg4">B-</label>
                </div>
                <div class="blood-option">
                    <input type="radio" name="bloodGroup" id="bg5" value="AB_POS"
                           th:checked="${donor != null && donor.bloodGroup.name() == 'AB_POS'}">
                    <label for="bg5">AB+</label>
                </div>
                <div class="blood-option">
                    <input type="radio" name="bloodGroup" id="bg6" value="AB_NEG"
                           th:checked="${donor != null && donor.bloodGroup.name() == 'AB_NEG'}">
                    <label for="bg6">AB-</label>
                </div>
                <div class="blood-option">
                    <input type="radio" name="bloodGroup" id="bg7" value="O_POS"
                           th:checked="${donor != null && donor.bloodGroup.name() == 'O_POS'}">
                    <label for="bg7">O+</label>
                </div>
                <div class="blood-option">
                    <input type="radio" name="bloodGroup" id="bg8" value="O_NEG"
                           th:checked="${donor != null && donor.bloodGroup.name() == 'O_NEG'}">
                    <label for="bg8">O-</label>
                </div>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" name="phone" class="form-control"
                   placeholder="e.g. 9876543210" required
                   th:value="${user != null ? user.phone : ''}">
        </div>
        <div class="mb-4">
            <label class="form-label">City</label>
            <input type="text" name="city" class="form-control"
                   placeholder="e.g. Bengaluru" required
                   th:value="${user != null ? user.city : ''}">
        </div>
        <button type="submit" class="btn btn-primary-red w-100">
            Save & Continue
        </button>
    </form>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
