<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: radial-gradient(circle at 12% 18%, rgba(192,57,43,0.16) 0, rgba(192,57,43,0) 32%), radial-gradient(circle at 88% 0%, rgba(231,76,60,0.12) 0, rgba(231,76,60,0) 28%), linear-gradient(135deg, #fff5f5 0%, #f6f9ff 58%, #eef4ff 100%) fixed; }
        .sidebar { background: #c0392b; min-height: 100vh; padding: 20px 0; width: 220px; flex-shrink: 0; }
        .sidebar a { color: #fff; display: block; padding: 10px 20px; text-decoration: none; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.15); }
        .brand { color: #fff; font-weight: 700; font-size: 1.1rem; padding: 10px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 10px; }
        .logout-form { margin: 0; }
        .logout-btn { background: none; border: none; color: #fff; width: 100%; text-align: left; padding: 10px 20px; }
        .logout-btn:hover { background: rgba(255,255,255,0.15); }
        .stat-card { border-radius: 10px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .stat-label { font-size: 13px; }
        .status-text { font-size: 1.1rem; }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar">
        <div class="brand">Smart Blood Bank</div>
        <a href="/donor/dashboard" class="active">Dashboard</a>
        <a href="/donor/profile">My Profile</a>
        <a href="/donor/requests">Emergency Requests</a>
        <a href="/donor/donations">Donation History</a>
        <a href="/donor/notifications">Notifications</a>
        <form th:action="@{/auth/logout}" method="post" class="logout-form">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>
    <div class="flex-grow-1 p-4">
        <h4 class="mb-1">Welcome, <span th:text="${username}">Donor</span></h4>
        <p class="text-muted mb-4">Donor Dashboard</p>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card stat-card p-3">
                    <p class="text-muted mb-1 stat-label">Total Donations</p>
                    <h3 class="mb-0" th:text="${totalDonations != null ? totalDonations : 0}">0</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card p-3">
                    <p class="text-muted mb-1 stat-label">Pending Requests</p>
                    <h3 class="mb-0" th:text="${pendingRequests}">0</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card p-3">
                    <p class="text-muted mb-1 stat-label">Status</p>
                    <h3 class="mb-0 text-success status-text" th:text="${donor != null ? donor.availabilityStatus : 'AVAILABLE'}">AVAILABLE</h3>
                </div>
            </div>
        </div>

        <div class="card p-4">
            <h6 class="mb-3">Recent Notifications</h6>
            <div th:if="${#lists.isEmpty(notifications)}" class="text-muted">No notifications yet.</div>
            <ul th:unless="${#lists.isEmpty(notifications)}" class="list-group list-group-flush">
                <li class="list-group-item px-0" th:each="n : ${notifications}" th:text="${n.message}">Notification</li>
            </ul>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
