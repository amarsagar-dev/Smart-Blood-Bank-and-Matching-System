<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: radial-gradient(circle at 12% 18%, rgba(192,57,43,0.16) 0, rgba(192,57,43,0) 32%), radial-gradient(circle at 88% 0%, rgba(231,76,60,0.12) 0, rgba(231,76,60,0) 28%), linear-gradient(135deg, #fff5f5 0%, #f6f9ff 58%, #eef4ff 100%) fixed; }
        .sidebar { background: #c0392b; min-height: 100vh; padding: 20px 0; width: 220px; flex-shrink: 0; }
        .sidebar a { color: #fff; display: block; padding: 10px 20px; text-decoration: none; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.15); }
        .brand { color: #fff; font-weight: 700; font-size: 1.1rem; padding: 10px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 10px; }
        .logout-form { margin: 0; }
        .logout-btn { background: none; border: none; color: #fff; width: 100%; text-align: left; padding: 10px 20px; }
        .logout-btn:hover { background: rgba(255,255,255,0.15); }
        .blood-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .blood-option input { display: none; }
        .blood-option label {
            display: block; text-align: center; padding: 10px 4px;
            border: 1.5px solid #dee2e6; border-radius: 8px;
            cursor: pointer; font-weight: 500; font-size: 14px;
            transition: all 0.2s;
        }
        .blood-option input:checked + label {
            border-color: #c0392b; background: #fdf0ef; color: #c0392b;
        }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar">
        <div class="brand">Smart Blood Bank</div>
        <a href="/donor/dashboard">Dashboard</a>
        <a href="/donor/profile" class="active">My Profile</a>
        <a href="/donor/requests">Emergency Requests</a>
        <a href="/donor/donations">Donation History</a>
        <a href="/donor/notifications">Notifications</a>
        <form th:action="@{/auth/logout}" method="post" class="logout-form">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>

    <div class="flex-grow-1 p-4">
        <h4 class="mb-1">My Donor Profile</h4>
        <p class="text-muted mb-4">Update your details and availability</p>

        <div th:if="${param.success}" class="alert alert-success">Profile updated successfully.</div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card p-4">
            <form th:action="@{/donor/profile}" method="post">
                <div class="mb-3">
                    <label class="form-label">Blood Group</label>
                    <div class="blood-grid">
                        <div class="blood-option">
                            <input type="radio" name="bloodGroup" id="bg1" value="A_POS" required th:checked="${donor != null && donor.bloodGroup.name() == 'A_POS'}">
                            <label for="bg1">A+</label>
                        </div>
                        <div class="blood-option">
                            <input type="radio" name="bloodGroup" id="bg2" value="A_NEG" th:checked="${donor != null && donor.bloodGroup.name() == 'A_NEG'}">
                            <label for="bg2">A-</label>
                        </div>
                        <div class="blood-option">
                            <input type="radio" name="bloodGroup" id="bg3" value="B_POS" th:checked="${donor != null && donor.bloodGroup.name() == 'B_POS'}">
                            <label for="bg3">B+</label>
                        </div>
                        <div class="blood-option">
                            <input type="radio" name="bloodGroup" id="bg4" value="B_NEG" th:checked="${donor != null && donor.bloodGroup.name() == 'B_NEG'}">
                            <label for="bg4">B-</label>
                        </div>
                        <div class="blood-option">
                            <input type="radio" name="bloodGroup" id="bg5" value="AB_POS" th:checked="${donor != null && donor.bloodGroup.name() == 'AB_POS'}">
                            <label for="bg5">AB+</label>
                        </div>
                        <div class="blood-option">
                            <input type="radio" name="bloodGroup" id="bg6" value="AB_NEG" th:checked="${donor != null && donor.bloodGroup.name() == 'AB_NEG'}">
                            <label for="bg6">AB-</label>
                        </div>
                        <div class="blood-option">
                            <input type="radio" name="bloodGroup" id="bg7" value="O_POS" th:checked="${donor != null && donor.bloodGroup.name() == 'O_POS'}">
                            <label for="bg7">O+</label>
                        </div>
                        <div class="blood-option">
                            <input type="radio" name="bloodGroup" id="bg8" value="O_NEG" th:checked="${donor != null && donor.bloodGroup.name() == 'O_NEG'}">
                            <label for="bg8">O-</label>
                        </div>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label" for="phone">Phone Number</label>
                        <input id="phone" type="text" name="phone" class="form-control" required
                               placeholder="e.g. 9876543210" title="Phone number"
                               th:value="${user != null ? user.phone : ''}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="city">City</label>
                        <input id="city" type="text" name="city" class="form-control" required
                               placeholder="e.g. Bengaluru" title="City"
                               th:value="${user != null ? user.city : ''}">
                    </div>
                </div>

                <div class="mt-3">
                    <label class="form-label" for="availabilityStatus">Availability Status</label>
                    <select id="availabilityStatus" name="availabilityStatus" class="form-select" required title="Availability status">
                        <option value="AVAILABLE" th:selected="${donor != null && donor.availabilityStatus.name() == 'AVAILABLE'}">AVAILABLE</option>
                        <option value="UNAVAILABLE" th:selected="${donor != null && donor.availabilityStatus.name() == 'UNAVAILABLE'}">UNAVAILABLE</option>
                        <option value="COOLDOWN" th:selected="${donor != null && donor.availabilityStatus.name() == 'COOLDOWN'}">COOLDOWN</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-danger mt-4">Save Changes</button>
            </form>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
