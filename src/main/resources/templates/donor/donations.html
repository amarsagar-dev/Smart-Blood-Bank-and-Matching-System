<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: radial-gradient(circle at 12% 18%, rgba(192,57,43,0.16) 0, rgba(192,57,43,0) 32%), radial-gradient(circle at 88% 0%, rgba(231,76,60,0.12) 0, rgba(231,76,60,0) 28%), linear-gradient(135deg, #fff5f5 0%, #f6f9ff 58%, #eef4ff 100%) fixed; }
        .sidebar { background: #c0392b; min-height: 100vh; padding: 20px 0; width: 220px; flex-shrink: 0; }
        .sidebar a { color: #fff; display: block; padding: 10px 20px; text-decoration: none; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.15); }
        .brand { color: #fff; font-weight: 700; font-size: 1.1rem; padding: 10px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 10px; }
        .logout-form { margin: 0; }
        .logout-btn { background: none; border: none; color: #fff; width: 100%; text-align: left; padding: 10px 20px; }
        .logout-btn:hover { background: rgba(255,255,255,0.15); }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar">
        <div class="brand">Smart Blood Bank</div>
        <a href="/donor/dashboard">Dashboard</a>
        <a href="/donor/profile">My Profile</a>
        <a href="/donor/requests">Emergency Requests</a>
        <a href="/donor/donations" class="active">Donation History</a>
        <a href="/donor/notifications">Notifications</a>
        <form th:action="@{/auth/logout}" method="post" class="logout-form">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>

    <div class="flex-grow-1 p-4">
        <h4 class="mb-1">Donation History</h4>
        <p class="text-muted mb-4">Total Donations: <strong th:text="${totalDonations}">0</strong></p>

        <div class="card p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Date</th>
                        <th>Units Donated</th>
                        <th>Request ID</th>
                        <th>Notes</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(donations)}">
                        <td colspan="4" class="text-center text-muted py-4">No donation records yet.</td>
                    </tr>
                    <tr th:each="donation : ${donations}">
                        <td th:text="${#temporals.format(donation.donationDate, 'dd MMM yyyy')}">27 Mar 2026</td>
                        <td th:text="${donation.unitsDonated}">1</td>
                        <td th:text="${donation.bloodRequest != null ? donation.bloodRequest.requestId : '-'}">-</td>
                        <td th:text="${donation.notes != null && !donation.notes.isBlank() ? donation.notes : '-'}">-</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
