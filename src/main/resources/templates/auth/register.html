<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Blood Bank - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: radial-gradient(circle at 12% 18%, rgba(192,57,43,0.16) 0, rgba(192,57,43,0) 32%), radial-gradient(circle at 88% 0%, rgba(231,76,60,0.12) 0, rgba(231,76,60,0) 28%), linear-gradient(135deg, #fff5f5 0%, #f6f9ff 58%, #eef4ff 100%) fixed; }
        .register-card {
            max-width: 440px;
            margin: 60px auto;
            border-radius: 18px;
            background: rgba(255,255,255,0.88);
            border: 1px solid rgba(192,57,43,0.16);
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 45px rgba(122, 22, 22, 0.14);
        }
        .brand { color: #c0392b; font-weight: 700; font-size: 1.4rem; }
        .btn-danger { background: #c0392b; border: none; }
        .btn-danger:hover { background: #aa3024; }
        .form-control, .form-select { border-radius: 10px; border-color: #e4e8f0; }
        .form-control:focus, .form-select:focus { border-color: #d05549; box-shadow: 0 0 0 0.2rem rgba(208,85,73,0.18); }
    </style>
</head>
<body>
<div class="card register-card p-4">
    <div class="text-center mb-4">
        <div class="brand">Smart Blood Bank</div>
        <p class="text-muted mt-1">Create your account</p>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/auth/register}" method="post">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control"
                   placeholder="Choose a username" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control"
                   placeholder="Enter your email" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control"
                   placeholder="Choose a password" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Register as</label>
            <select name="role" class="form-select" required title="Register role">
                <option value="">-- Select role --</option>
                <option value="DONOR">Donor</option>
                <option value="HOSPITAL">Hospital</option>
                <option value="ADMIN">Admin</option>
            </select>
        </div>
        <button type="submit" class="btn btn-danger w-100">Create Account</button>
    </form>

    <hr>
    <div class="text-center">
        <span class="text-muted">Already have an account? </span>
        <a th:href="@{/auth/login}" class="text-danger">Sign in here</a>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
