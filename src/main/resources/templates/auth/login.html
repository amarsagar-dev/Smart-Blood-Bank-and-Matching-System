<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Blood Bank - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: radial-gradient(circle at 12% 18%, rgba(192,57,43,0.16) 0, rgba(192,57,43,0) 32%), radial-gradient(circle at 88% 0%, rgba(231,76,60,0.12) 0, rgba(231,76,60,0) 28%), linear-gradient(135deg, #fff5f5 0%, #f6f9ff 58%, #eef4ff 100%) fixed; }
        .login-card {
            max-width: 420px;
            margin: 100px auto;
            border-radius: 18px;
            background: rgba(255,255,255,0.88);
            border: 1px solid rgba(192,57,43,0.16);
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 45px rgba(122, 22, 22, 0.14);
        }
        .form-control { border-radius: 10px; border-color: #e4e8f0; }
        .form-control:focus { border-color: #d05549; box-shadow: 0 0 0 0.2rem rgba(208,85,73,0.18); }
        .btn-danger { background: #c0392b; border: none; }
        .btn-danger:hover { background: #aa3024; }
        .brand { color: #c0392b; font-weight: 700; font-size: 1.4rem; }
    </style>
</head>
<body>
<div class="card login-card p-4">
    <div class="text-center mb-4">
        <div class="brand">Smart Blood Bank</div>
        <p class="text-muted mt-1">Emergency Matching System</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger" role="alert">
        Invalid username or password.
    </div>
    <div th:if="${param.logout}" class="alert alert-success" role="alert">
        You have been logged out.
    </div>

    <form th:action="@{/auth/login}" method="post">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-danger w-100">Sign In</button>
    </form>

    <hr>
    <div class="text-center">
        <span class="text-muted">Don't have an account? </span>
        <a th:href="@{/auth/register}" class="text-danger">Register here</a>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
