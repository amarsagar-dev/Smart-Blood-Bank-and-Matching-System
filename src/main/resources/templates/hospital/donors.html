<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hospital Donors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: radial-gradient(circle at 12% 18%, rgba(192,57,43,0.16) 0, rgba(192,57,43,0) 32%), radial-gradient(circle at 88% 0%, rgba(231,76,60,0.12) 0, rgba(231,76,60,0) 28%), linear-gradient(135deg, #fff5f5 0%, #f6f9ff 58%, #eef4ff 100%) fixed; }
        .sidebar { background: #c0392b; min-height: 100vh; padding: 20px 0; }
        .sidebar a { color: #fff; display: block; padding: 10px 20px; text-decoration: none; }
        .sidebar a:hover { background: rgba(255,255,255,0.15); }
        .brand { color: #fff; font-weight: 700; font-size: 1.1rem; padding: 10px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 10px; }
        .logout-btn { background: none; border: none; color: #fff; width: 100%; text-align: left; padding: 10px 20px; }
        .logout-btn:hover { background: rgba(255,255,255,0.15); }
        .stat-card { border-radius: 10px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar" style="width: 220px; flex-shrink: 0;">
        <div class="brand">Smart Blood Bank</div>
        <a href="/hospital/dashboard">Dashboard</a>
        <a href="/hospital/request">Request Blood</a>
        <a href="/hospital/inventory">Blood Inventory</a>
        <a href="/hospital/donors">View Donors</a>
        <form th:action="@{/auth/logout}" method="post" style="margin:0;">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>

    <div class="flex-grow-1 p-4">
        <h4 class="mb-1">Donor Directory</h4>
        <p class="text-muted mb-4">View donor identity, blood group, and availability status.</p>

        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card stat-card p-3">
                    <p class="text-muted mb-1" style="font-size:13px;">Total Donors</p>
                    <h3 class="mb-0" th:text="${totalDonors}">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card p-3">
                    <p class="text-muted mb-1" style="font-size:13px;">Available Now</p>
                    <h3 class="mb-0" th:text="${availableDonors}">0</h3>
                </div>
            </div>
        </div>

        <div class="card p-4">
            <h6 class="mb-3">All Donors</h6>
            <div th:if="${#lists.isEmpty(donors)}" class="text-muted">No donors found.</div>
            <div th:unless="${#lists.isEmpty(donors)}" class="table-responsive">
                <table class="table table-striped align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Blood Group</th>
                            <th>Availability</th>
                            <th>Phone</th>
                            <th>City</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="d : ${donors}">
                            <td th:text="${d.user.username}">donor</td>
                            <td th:text="${d.bloodGroup.dbValue}">A+</td>
                            <td>
                                <span th:class="${d.availabilityStatus.name() == 'AVAILABLE' ? 'badge bg-success' : (d.availabilityStatus.name() == 'COOLDOWN' ? 'badge bg-warning text-dark' : 'badge bg-secondary')}"
                                      th:text="${d.availabilityStatus}">AVAILABLE</span>
                            </td>
                            <td th:text="${d.user.phone != null && !#strings.isEmpty(d.user.phone) ? d.user.phone : '-'}">-</td>
                            <td th:text="${d.user.city != null && !#strings.isEmpty(d.user.city) ? d.user.city : '-'}">-</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
