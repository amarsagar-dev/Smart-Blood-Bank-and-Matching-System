<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Blood</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: radial-gradient(circle at 12% 18%, rgba(192,57,43,0.16) 0, rgba(192,57,43,0) 32%), radial-gradient(circle at 88% 0%, rgba(231,76,60,0.12) 0, rgba(231,76,60,0) 28%), linear-gradient(135deg, #fff5f5 0%, #f6f9ff 58%, #eef4ff 100%) fixed; }
        .sidebar { background: #c0392b; min-height: 100vh; padding: 20px 0; width: 220px; flex-shrink: 0; }
        .sidebar a { color: #fff; display: block; padding: 10px 20px; text-decoration: none; }
        .sidebar a:hover { background: rgba(255,255,255,0.15); }
        .brand { color: #fff; font-weight: 700; font-size: 1.1rem; padding: 10px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 10px; }
        .logout-btn { background: none; border: none; color: #fff; padding: 10px 20px; width: 100%; text-align: left; cursor: pointer; }
        .logout-btn:hover { background: rgba(255,255,255,0.15); }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar">
        <div class="brand">Smart Blood Bank</div>
        <a href="/hospital/dashboard">Dashboard</a>
        <a href="/hospital/request">Request Blood</a>
        <a href="/hospital/requests">My Requests</a>
        <a href="/hospital/inventory">Blood Inventory</a>
        <a href="/hospital/donors">View Donors</a>
        <form th:action="@{/auth/logout}" method="post" style="margin:0;">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>
    <div class="flex-grow-1 p-4">
        <h4 class="mb-1">Request Blood</h4>
        <p class="text-muted mb-4">Raise an emergency blood request</p>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card p-4" style="max-width: 500px;">
            <form th:action="@{/hospital/request}" method="post">
                <div class="mb-3">
                    <label class="form-label">Blood Group Required</label>
                    <select name="bloodGroup" class="form-select" required title="Blood group required">
                        <option value="">-- Select blood group --</option>
                        <option value="A_POS">A+</option>
                        <option value="A_NEG">A-</option>
                        <option value="B_POS">B+</option>
                        <option value="B_NEG">B-</option>
                        <option value="AB_POS">AB+</option>
                        <option value="AB_NEG">AB-</option>
                        <option value="O_POS">O+</option>
                        <option value="O_NEG">O-</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Units Needed</label>
                    <input type="number" name="units" class="form-control" min="1" max="10" value="1" required title="Units needed" placeholder="Enter units">
                </div>
                <div class="mb-4">
                    <label class="form-label">Urgency Level</label>
                    <select name="urgency" class="form-select" required title="Urgency level">
                        <option value="NORMAL">Normal</option>
                        <option value="URGENT">Urgent</option>
                        <option value="CRITICAL">Critical</option>
                    </select>
                </div>
                <button type="submit" class="btn w-100" style="background:#c0392b; color:#fff;">Submit Blood Request</button>
            </form>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
