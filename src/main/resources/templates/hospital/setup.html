<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Setup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }

        .setup-card {
            width: 100%;
            max-width: 520px;
            border-radius: 18px;
        }

        .brand {
            color: #e23f33;
            font-weight: 700;
            font-size: 1.9rem;
            letter-spacing: 0.3px;
        }

        .setup-subtitle {
            color: #ffd7da;
        }

        .form-label {
            color: #ffe8ea;
            font-weight: 600;
        }

        .helper-text {
            color: #ffc9cc;
        }
    </style>
</head>
<body>
<div class="card setup-card p-4">
    <div class="text-center mb-4">
        <div class="brand">Smart Blood Bank</div>
        <h3 class="mt-2">Complete Hospital Profile</h3>
        <p class="setup-subtitle mb-0">Fill in your hospital details to start requesting blood</p>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/hospital/setup}" method="post">
        <div class="mb-3">
            <label class="form-label" for="hospitalName">Hospital Name</label>
            <input id="hospitalName" type="text" name="hospitalName" class="form-control"
                   placeholder="e.g. City General Hospital" required>
        </div>
        <div class="mb-3">
            <label class="form-label" for="licenseNumber">License Number</label>
            <input id="licenseNumber" type="text" name="licenseNumber" class="form-control"
                   placeholder="e.g. LIC-2024-001" required>
        </div>
        <div class="mb-3">
            <label class="form-label" for="address">Address</label>
            <textarea id="address" name="address" class="form-control" rows="2"
                      placeholder="Full hospital address"></textarea>
            <small class="helper-text">Include street, area, and landmark if available.</small>
        </div>
        <div class="mb-4">
            <label class="form-label" for="city">City</label>
            <input id="city" type="text" name="city" class="form-control"
                   placeholder="e.g. Bengaluru" required>
        </div>
        <button type="submit" class="btn btn-primary-red w-100">Save & Continue</button>
    </form>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
