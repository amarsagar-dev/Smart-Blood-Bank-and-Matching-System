<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: radial-gradient(circle at 12% 18%, rgba(192,57,43,0.16) 0, rgba(192,57,43,0) 32%), radial-gradient(circle at 88% 0%, rgba(231,76,60,0.12) 0, rgba(231,76,60,0) 28%), linear-gradient(135deg, #fff5f5 0%, #f6f9ff 58%, #eef4ff 100%) fixed; }
        .sidebar { background: #2c3e50; min-height: 100vh; padding: 20px 0; width: 220px; flex-shrink: 0; }
        .sidebar a { color: #fff; display: block; padding: 10px 20px; text-decoration: none; }
        .sidebar a:hover { background: rgba(255,255,255,0.1); }
        .brand { color: #fff; font-weight: 700; font-size: 1.1rem; padding: 10px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 10px; }
        .logout-form { margin: 0; }
        .logout-btn { background: none; border: none; color: #fff; width: 100%; text-align: left; padding: 10px 20px; }
        .logout-btn:hover { background: rgba(255,255,255,0.1); }
        .stat-card { border-radius: 10px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .stat-label { font-size: 13px; }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar">
        <div class="brand">Smart Blood Bank</div>
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/users">Manage Users</a>
        <a href="/admin/requests">All Requests</a>
        <a href="/admin/report">Reports</a>
        <form th:action="@{/auth/logout}" method="post" class="logout-form">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>
    <div class="flex-grow-1 p-4">
        <h4 class="mb-1">Welcome, <span th:text="${username}">Admin</span></h4>
        <p class="text-muted mb-4">Admin Control Panel</p>

        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card stat-card p-3">
                    <p class="text-muted mb-1 stat-label">Total Users</p>
                    <h3 class="mb-0" th:text="${totalUsers}">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card p-3">
                    <p class="text-muted mb-1 stat-label">Total Donors</p>
                    <h3 class="mb-0" th:text="${totalDonors}">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card p-3">
                    <p class="text-muted mb-1 stat-label">Hospitals</p>
                    <h3 class="mb-0" th:text="${totalHospitals}">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card p-3">
                    <p class="text-muted mb-1 stat-label">Active Requests</p>
                    <h3 class="mb-0" th:text="${activeRequests}">0</h3>
                </div>
            </div>
        </div>

        <div class="card p-4">
            <h6 class="mb-3">Recent Activity</h6>
            <p class="text-muted">No activity yet.</p>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
