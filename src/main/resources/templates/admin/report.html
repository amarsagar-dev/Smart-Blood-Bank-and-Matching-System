<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin Reports</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<style>
		body { background: radial-gradient(circle at 12% 18%, rgba(192,57,43,0.16) 0, rgba(192,57,43,0) 32%), radial-gradient(circle at 88% 0%, rgba(231,76,60,0.12) 0, rgba(231,76,60,0) 28%), linear-gradient(135deg, #fff5f5 0%, #f6f9ff 58%, #eef4ff 100%) fixed; }
		.sidebar { background: #2c3e50; min-height: 100vh; padding: 20px 0; width: 220px; flex-shrink: 0; }
		.sidebar a { color: #fff; display: block; padding: 10px 20px; text-decoration: none; }
		.sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.12); }
		.brand { color: #fff; font-weight: 700; font-size: 1.1rem; padding: 10px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 10px; }
		.logout-form { margin: 0; }
		.logout-btn { background: none; border: none; color: #fff; width: 100%; text-align: left; padding: 10px 20px; }
		.logout-btn:hover { background: rgba(255,255,255,0.12); }
		.stat-card { border-radius: 10px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
		.chart-box { position: relative; height: 240px; }
	</style>
</head>
<body>
<div class="d-flex">
	<div class="sidebar">
		<div class="brand">Smart Blood Bank</div>
		<a href="/admin/dashboard">Dashboard</a>
		<a href="/admin/users">Manage Users</a>
		<a href="/admin/requests">All Requests</a>
		<a href="/admin/report" class="active">Reports</a>
		<form th:action="@{/auth/logout}" method="post" class="logout-form">
			<button type="submit" class="logout-btn">Logout</button>
		</form>
	</div>

	<div class="flex-grow-1 p-4">
		<h4 class="mb-1">Summary Reports</h4>
		<p class="text-muted mb-4">Signed in as <span th:text="${username}">admin</span></p>

		<div class="row g-3 mb-4">
			<div class="col-md-3">
				<div class="card stat-card p-3">
					<p class="text-muted mb-1 small">Total Users</p>
					<h3 class="mb-0" th:text="${totalUsers}">0</h3>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card stat-card p-3">
					<p class="text-muted mb-1 small">Total Donors</p>
					<h3 class="mb-0" th:text="${totalDonors}">0</h3>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card stat-card p-3">
					<p class="text-muted mb-1 small">Total Hospitals</p>
					<h3 class="mb-0" th:text="${totalHospitals}">0</h3>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card stat-card p-3">
					<p class="text-muted mb-1 small">Total Requests</p>
					<h3 class="mb-0" th:text="${totalRequests}">0</h3>
				</div>
			</div>
		</div>

		<div class="card p-4">
			<h6 class="mb-3">Request Status Breakdown</h6>
			<div class="row g-2">
				<div class="col-sm-6 col-lg-3">
					<div class="border rounded p-3 bg-white">
						<div class="text-muted small">Pending</div>
						<div class="h4 mb-0" th:text="${pendingRequests}">0</div>
					</div>
				</div>
				<div class="col-sm-6 col-lg-3">
					<div class="border rounded p-3 bg-white">
						<div class="text-muted small">Matched</div>
						<div class="h4 mb-0" th:text="${matchedRequests}">0</div>
					</div>
				</div>
				<div class="col-sm-6 col-lg-3">
					<div class="border rounded p-3 bg-white">
						<div class="text-muted small">Fulfilled</div>
						<div class="h4 mb-0" th:text="${fulfilledRequests}">0</div>
					</div>
				</div>
				<div class="col-sm-6 col-lg-3">
					<div class="border rounded p-3 bg-white">
						<div class="text-muted small">Cancelled</div>
						<div class="h4 mb-0" th:text="${cancelledRequests}">0</div>
					</div>
				</div>
			</div>
		</div>

		<div class="row g-3 mt-1">
			<div class="col-lg-6">
				<div class="card p-3">
					<h6 class="mb-3">Request Status Chart</h6>
					<div class="chart-box">
						<canvas id="requestStatusChart"></canvas>
					</div>
				</div>
			</div>
			<div class="col-lg-6">
				<div class="card p-3">
					<h6 class="mb-3">User Distribution Chart</h6>
					<div class="chart-box">
						<canvas id="userDistributionChart"></canvas>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
	const pendingRequests = /*[[${pendingRequests}]]*/ 0;
	const matchedRequests = /*[[${matchedRequests}]]*/ 0;
	const fulfilledRequests = /*[[${fulfilledRequests}]]*/ 0;
	const cancelledRequests = /*[[${cancelledRequests}]]*/ 0;

	const adminUsers = /*[[${adminUsers}]]*/ 0;
	const donorUsers = /*[[${donorUsers}]]*/ 0;
	const hospitalUsers = /*[[${hospitalUsers}]]*/ 0;

	const axisColor = "rgba(255, 236, 237, 0.82)";

	new Chart(document.getElementById("requestStatusChart"), {
		type: "doughnut",
		data: {
			labels: ["Pending", "Matched", "Fulfilled", "Cancelled"],
			datasets: [{
				data: [pendingRequests, matchedRequests, fulfilledRequests, cancelledRequests],
				backgroundColor: ["#f59e0b", "#3b82f6", "#22c55e", "#6b7280"],
				borderColor: "rgba(22, 10, 12, 0.85)",
				borderWidth: 2
			}]
		},
		options: {
			responsive: true,
			maintainAspectRatio: false,
			plugins: {
				legend: {
					position: "bottom",
					labels: { color: axisColor }
				}
			}
		}
	});

	new Chart(document.getElementById("userDistributionChart"), {
		type: "bar",
		data: {
			labels: ["Admin", "Donor", "Hospital"],
			datasets: [{
				label: "Users",
				data: [adminUsers, donorUsers, hospitalUsers],
				backgroundColor: ["#ef4444", "#f97316", "#ec4899"],
				borderRadius: 8
			}]
		},
		options: {
			responsive: true,
			maintainAspectRatio: false,
			plugins: {
				legend: { display: false }
			},
			scales: {
				x: {
					ticks: { color: axisColor },
					grid: { color: "rgba(255,255,255,0.08)" }
				},
				y: {
					beginAtZero: true,
					ticks: { color: axisColor, precision: 0 },
					grid: { color: "rgba(255,255,255,0.08)" }
				}
			}
		}
	});
</script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
