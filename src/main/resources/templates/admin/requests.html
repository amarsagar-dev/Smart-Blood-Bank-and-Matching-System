<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Requests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: radial-gradient(circle at 12% 18%, rgba(192,57,43,0.16) 0, rgba(192,57,43,0) 32%), radial-gradient(circle at 88% 0%, rgba(231,76,60,0.12) 0, rgba(231,76,60,0) 28%), linear-gradient(135deg, #fff5f5 0%, #f6f9ff 58%, #eef4ff 100%) fixed; }
        .sidebar { background: #2c3e50; min-height: 100vh; padding: 20px 0; width: 220px; flex-shrink: 0; }
        .sidebar a { color: #fff; display: block; padding: 10px 20px; text-decoration: none; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.12); }
        .brand { color: #fff; font-weight: 700; font-size: 1.1rem; padding: 10px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 10px; }
        .logout-form { margin: 0; }
        .logout-btn { background: none; border: none; color: #fff; width: 100%; text-align: left; padding: 10px 20px; }
        .logout-btn:hover { background: rgba(255,255,255,0.12); }
        .status-PENDING { background: #f39c12; }
        .status-MATCHED { background: #3498db; }
        .status-FULFILLED { background: #27ae60; }
        .status-CANCELLED { background: #7f8c8d; }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar">
        <div class="brand">Smart Blood Bank</div>
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/users">Manage Users</a>
        <a href="/admin/requests" class="active">All Requests</a>
        <a href="/admin/report">Reports</a>
        <form th:action="@{/auth/logout}" method="post" class="logout-form">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>

    <div class="flex-grow-1 p-4">
        <h4 class="mb-1">All Blood Requests</h4>
        <p class="text-muted mb-4">Signed in as <span th:text="${username}">admin</span></p>

        <div class="card p-0">
            <div class="table-responsive">
                <table class="table table-striped mb-0 align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Request ID</th>
                        <th>Hospital</th>
                        <th>Blood Group</th>
                        <th>Units</th>
                        <th>Urgency</th>
                        <th>Status</th>
                        <th>Requested At</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(requests)}">
                        <td colspan="7" class="text-center text-muted py-4">No requests found.</td>
                    </tr>
                    <tr th:each="request : ${requests}">
                        <td th:text="${request.requestId}">1</td>
                        <td th:text="${request.hospital != null ? request.hospital.hospitalName : '-'}">General Hospital</td>
                        <td th:text="${request.bloodGroup != null ? request.bloodGroup.dbValue : '-'}">A+</td>
                        <td th:text="${request.unitsNeeded}">2</td>
                        <td th:text="${request.urgencyLevel}">NORMAL</td>
                        <td>
                            <span class="badge text-white"
                                  th:classappend="${' status-' + request.status}"
                                  th:text="${request.status}">PENDING</span>
                        </td>
                        <td th:text="${#temporals.format(request.requestedAt, 'dd MMM yyyy, hh:mm a')}">27 Mar 2026, 10:00 AM</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
