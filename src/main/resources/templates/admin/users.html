<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: radial-gradient(circle at 12% 18%, rgba(192,57,43,0.16) 0, rgba(192,57,43,0) 32%), radial-gradient(circle at 88% 0%, rgba(231,76,60,0.12) 0, rgba(231,76,60,0) 28%), linear-gradient(135deg, #fff5f5 0%, #f6f9ff 58%, #eef4ff 100%) fixed; }
        .sidebar { background: #2c3e50; min-height: 100vh; padding: 20px 0; width: 220px; flex-shrink: 0; }
        .sidebar a { color: #fff; display: block; padding: 10px 20px; text-decoration: none; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.12); }
        .brand { color: #fff; font-weight: 700; font-size: 1.1rem; padding: 10px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 10px; }
        .logout-form { margin: 0; }
        .logout-btn { background: none; border: none; color: #fff; width: 100%; text-align: left; padding: 10px 20px; }
        .logout-btn:hover { background: rgba(255,255,255,0.12); }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar">
        <div class="brand">Smart Blood Bank</div>
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/users" class="active">Manage Users</a>
        <a href="/admin/requests">All Requests</a>
        <a href="/admin/report">Reports</a>
        <form th:action="@{/auth/logout}" method="post" class="logout-form">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>

    <div class="flex-grow-1 p-4">
        <h4 class="mb-1">User Management</h4>
        <p class="text-muted mb-4">Signed in as <span th:text="${username}">admin</span></p>

        <div class="card p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>City</th>
                        <th>Phone</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="6" class="text-center text-muted py-4">No users found.</td>
                    </tr>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.userId}">1</td>
                        <td th:text="${user.username}">username</td>
                        <td th:text="${user.email}">email@example.com</td>
                        <td><span class="badge bg-secondary" th:text="${user.role}">ADMIN</span></td>
                        <td th:text="${user.city != null ? user.city : '-'}">-</td>
                        <td th:text="${user.phone != null ? user.phone : '-'}">-</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
